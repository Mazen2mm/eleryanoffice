<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتب هاني العريان | تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<link rel="shortcut icon" href="1.png" type="image/x-icon">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body class="admin-body">

<div class="login-wrapper">
    <img src="4.png" alt="لوجو" class="admin-logo">
    <h1>برجاء تسجيل الدخول</h1>
    <p class="subtitle">مكتب هاني العريان للاستشارات المالية والضريبية</p>

    <form id="loginForm">
        <div class="admin-input-group">
            <label for="username">اسم المستخدم</label>
            <div class="input-wrap">
                <input type="text" id="username" autocomplete="username" required>
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
        <div class="admin-input-group">
            <label for="password">كلمة المرور</label>
            <div class="input-wrap">
                <input type="password" id="password" autocomplete="current-password" required>
                <i class="fa-solid fa-lock"></i>
            </div>
        </div>
        <button type="submit" class="admin-login-btn">
            <i class="fa-solid fa-right-to-bracket"></i>
            <span>دخول</span>
        </button>
        <p class="login-error" id="loginError"></p>
    </form>

    <a href="index.html" class="back-home-link"><i class="fa-solid fa-arrow-right"></i> العودة للموقع الرئيسي</a>
</div>

<script src="admin.js"></script>
<script src="admin.js"></script>
<script>
// --- السطر ده هو اللي كان ناقص عشان يفتح الاتصال بقاعدة البيانات ---
initFirebase();

document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var u = document.getElementById('username').value.trim();
    var p = document.getElementById('password').value.trim();
    var errorEl = document.getElementById('loginError');
    var btn = document.querySelector('.admin-login-btn');

    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
    btn.disabled = true;

    verifyLogin(u, p, function(userDoc, errorMessage) {
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> <span>دخول</span>';
        btn.disabled = false;
        
        if (userDoc) {
            // حفظ بيانات الدخول والصلاحيات
            sessionStorage.setItem('eleryan_user_logged_in', u);
            sessionStorage.setItem('eleryan_user_role', userDoc.role);
            sessionStorage.setItem('eleryan_user_permissions', JSON.stringify(userDoc.permissions || []));
            
            // عشان نتفادى الكاش القديم
            sessionStorage.setItem('eleryan_admin_logged_in', 'true');
            
            window.location.href = 'admin-home.html';
        } else {
            errorEl.textContent = errorMessage || 'اسم المستخدم أو كلمة المرور غير صحيحة';
            btn.style.animation = 'none';
            void btn.offsetWidth;
            btn.style.animation = 'shake 0.4s';
        }
    });
});
</script>
<style>
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
}
</style>
</body>
</html>
