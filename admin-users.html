<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتب هاني العريان | مستخدمي لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body class="admin-body" style="align-items: flex-start; padding: 25px 15px;">

<div class="dashboard">

    <div class="dashboard-header">
        <div class="header-title">
            <img src="4.png" alt="لوجو">
            <span>مستخدمي لوحة التحكم</span>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <a href="admin-home.html" class="logout-btn" style="text-decoration:none;">
                <i class="fa-solid fa-house"></i> الرئيسية
            </a>
            <button class="logout-btn" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج
            </button>
        </div>
    </div>

    <div class="admin-panel active">
        <div class="panel-toolbar">
            <h2>إضافة مستخدم جديد</h2>
        </div>
        <form class="clients-admin-form" id="addAdminUserForm">
            <input type="text" id="newAdminUsername" placeholder="اسم المستخدم" required>
            <input type="text" id="newAdminPassword" placeholder="كلمة المرور" required>
            <button type="submit"><i class="fa-solid fa-plus"></i> إضافة</button>
        </form>
    </div>

    <div class="admin-panel active" style="margin-top:20px;">
        <div class="panel-toolbar">
            <h2>المستخدمين الحاليين</h2>
        </div>
        <div class="table-scroll">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>م</th>
                        <th>اسم المستخدم</th>
                        <th>حذف</th>
                    </tr>
                </thead>
                <tbody id="adminUsersTableBody">
                    <tr><td colspan="3">جاري التحميل...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div class="save-toast" id="saveToast"><i class="fa-solid fa-circle-check"></i> <span>تم الحفظ بنجاح</span></div>

<script src="admin.js"></script>
</body>
</html>
